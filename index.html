<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TUYE ANGOLA</title>

<style>
body { margin:0; font-family:'Segoe UI'; scroll-behavior:smooth; }

/* HEADER */
header {
  position:absolute;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  z-index:10;
}
header img { height:50px; }

nav a {
  color:white;
  margin:10px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero { position:relative; height:100vh; }
.hero video {
  width:100%;
  height:100%;
  object-fit:cover;
}
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}
.hero-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  color:white;
  text-align:center;
}
.hero-content h1 { font-size:60px; }

/* BUTTONS */
button {
  padding:12px 18px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
.btn-primary { background:#007BFF; color:white; }
.btn-whatsapp { background:#25D366; color:white; }

/* SECTIONS */
.section {
  padding:70px 20px;
  text-align:center;
}

/* EVENTOS */
.event {
  background:#f4f6f9;
  margin:15px auto;
  padding:20px;
  max-width:600px;
  border-left:5px solid #007BFF;
}

/* TURISMO */
.turismo-container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}
.turismo-card {
  width:300px;
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
.turismo-card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CARROSSEL */
.carousel {
  max-width:800px;
  margin:auto;
}
.carousel img {
  width:100%;
  display:none;
}
.carousel img.active {
  display:block;
}

/* MAPA */
iframe {
  width:100%;
  height:400px;
  border:0;
}

/* SOCIAL */
.social-link {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:10px;
  font-weight:bold;
  text-decoration:none;
}

/* LANG */
.lang {
  position:fixed;
  top:10px;
  right:10px;
}
.lang button {
  background:#007BFF;
  color:white;
}

/* FOOTER */
footer {
  background:#001f3f;
  color:white;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- 🌐 LANG -->
<div class="lang">
<button onclick="setLang('pt')">PT</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
</div>

<!-- HERO -->
<div class="hero">

<video autoplay muted loop>
<source src="video.mp4">
</video>

<div class="overlay"></div>

<header>
<img src="logo.png">
<nav>
<a href="#eventos">Eventos</a>
<a href="#turismo">Turismo</a>
<a href="#mapa">Mapa</a>
<a href="#contacto">Contacto</a>
</nav>
</header>

<div class="hero-content">
<h1>TUYE ANGOLA</h1>
<p data-i18n="slogan"></p>

<button class="btn-primary">Inscrever</button>
<button class="btn-whatsapp" onclick="window.open('https://chat.whatsapp.com/FnTC4KuSnvLJiep9CGWWv8')">
Entrar no Grupo
</button>

</div>
</div>

<!-- EVENTOS -->
<div class="section" id="eventos">
<h2 data-i18n="eventos"></h2>

<div class="event">
<h3>Cuchi</h3>
<p>Turismo comunitário.</p>
</div>

<div class="event">
<h3>Cuito Cuanavale</h3>
<p>Turismo histórico.</p>
</div>

</div>

<!-- TURISMO -->
<div class="section" id="turismo">
<h2 data-i18n="turismo"></h2>

<div class="turismo-container">

<div class="turismo-card">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2b/Kalandula_Falls.jpg">
<p>Kalandula</p>
</div>

<div class="turismo-card">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Serra_da_Leba.jpg">
<p>Serra da Leba</p>
</div>

</div>

<!-- CARROSSEL -->
<div class="carousel">
<img class="active" src="https://upload.wikimedia.org/wikipedia/commons/7/7d/Benguela_coast.jpg">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Iona_National_Park.jpg">
</div>

</div>

<!-- MAPA -->
<div class="section" id="mapa">
<h2>Mapa de Angola</h2>

<iframe src="https://www.google.com/maps?q=Angola&output=embed"></iframe>

</div>

<!-- ESTATISTICAS -->
<div class="section">
<h2>Estatísticas</h2>
<p>Visitantes: <span id="visitas"></span></p>
</div>

<!-- CONTACTO -->
<div class="section" id="contacto">

<h2>Contacto</h2>

<a class="social-link" href="https://www.facebook.com" target="_blank">
📘 Facebook
</a>

<a class="social-link" href="https://chat.whatsapp.com" target="_blank">
📱 WhatsApp
</a>

</div>

<footer>
<p>© 2026 TUYE ANGOLA</p>
</footer>

<script>

/* VISITAS */
let v = localStorage.getItem("visitas") || 0;
v++;
localStorage.setItem("visitas", v);
document.getElementById("visitas").innerText = v;

/* CARROSSEL */
let slides = document.querySelectorAll(".carousel img");
let i = 0;

setInterval(()=>{
slides[i].classList.remove("active");
i = (i+1)%slides.length;
slides[i].classList.add("active");
},3000);

/* MULTI IDIOMA */
const txt = {
pt:{eventos:"Eventos", turismo:"Turismo", slogan:"Turismo • Desenvolvimento • Transformação"},
en:{eventos:"Events", turismo:"Tourism", slogan:"Tourism • Development • Transformation"},
fr:{eventos:"Événements", turismo:"Tourisme", slogan:"Tourisme • Développement • Transformation"}
};

function setLang(l){
document.querySelectorAll("[data-i18n]").forEach(e=>{
e.innerText = txt[l][e.getAttribute("data-i18n")];
});
}

setLang("pt");

</script>

</body>
</html>
