<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TUYE ANGOLA</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>

body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#f4f6f9;
}

/* HEADER */
header {
  background:#002f5b;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-weight:bold;
}

/* MENU MOBILE */
.menu {
  display:none;
}

.menu a {
  color:white;
  margin:10px;
  text-decoration:none;
}

/* HERO */
.hero {
  background:url('https://source.unsplash.com/1600x900/?angola,tourism') center/cover;
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}

.hero-content h1 {
  font-size:40px;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

.primary {
  background:#007BFF;
  color:white;
}

.whatsapp {
  background:#25D366;
  color:white;
}

/* SEÇÕES */
.section {
  padding:40px 20px;
  text-align:center;
}

/* CARDS */
.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:white;
  padding:20px;
  margin:10px;
  border-radius:10px;
  width:250px;
}

/* FOOTER */
footer {
  background:#002f5b;
  color:white;
  text-align:center;
  padding:20px;
}

/* MOBILE */
@media(max-width:768px){
  .cards { flex-direction:column; }
}

</style>

</head>

<body>

<header>
  <div class="logo">TUYE ANGOLA</div>

  <nav class="menu">
    <a href="#sobre">Sobre</a>
    <a href="#eventos">Eventos</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Transformando Angola</h1>

    <button class="primary" onclick="scrollForm()">
      Inscrever-se
    </button>

    <button class="whatsapp" onclick="window.open('https://chat.whatsapp.com/FnTC4KuSnvLJiep9CGWWv8','_blank')">
      Entrar no Grupo
    </button>
  </div>
</section>

<!-- SOBRE -->
<section class="section" id="sobre">
  <h2>Sobre</h2>
  <p>Associação TUYE ANGOLA dedicada ao turismo e desenvolvimento social.</p>
</section>

<!-- EVENTOS -->
<section class="section" id="eventos">
  <h2>Eventos</h2>

  <div class="cards">
    <div class="card">Cuchi - Turismo Comunitário</div>
    <div class="card">Cuito Cuanavale - História</div>
    <div class="card">Menongue - Cultura</div>
  </div>
</section>

<!-- MAPA -->
<section class="section">
  <h2>Mapa</h2>
  <iframe 
    src="https://www.google.com/maps?q=Angola&output=embed"
    width="100%" height="300">
  </iframe>
</section>

<!-- INSCRIÇÃO REAL -->
<section class="section" id="inscricao">
  <h2>Inscrição</h2>

  <form name="inscricao" method="POST" data-netlify="true">
    <input type="text" name="nome" placeholder="Nome" required style="padding:10px;width:80%;margin:10px;"><br>
    <input type="email" name="email" placeholder="Email" required style="padding:10px;width:80%;margin:10px;"><br>
    <button class="primary">Enviar</button>
  </form>
</section>

<!-- CONTACTO -->
<section class="section" id="contacto">
  <h2>Contacto</h2>
  <p>Email: tuyeangola@email.com</p>
</section>

<footer>
  © 2026 TUYE ANGOLA
</footer>

<script>
function scrollForm(){
  document.getElementById("inscricao").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
